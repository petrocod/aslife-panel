# Hostinger Docker Manager — docker-compose.yaml (branch master)
# env از پارامتر environment در API/MCP تزریق می‌شود (بدون env_file)

services:
  asistan-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asistan-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
