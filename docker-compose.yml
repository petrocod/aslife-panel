# aSistan — Hostinger VPS (Traefik + asixtan.com)
# Traefik روی این VPS: شبکه web + certresolver mytlschallenge (مثل seyahatmarket)

services:
  asistan-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
        NEXT_PUBLIC_SALES_EMAIL: ${NEXT_PUBLIC_SALES_EMAIL}
        SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    container_name: asistan-app
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - default
      - web
    labels:
      - traefik.enable=true
      - traefik.docker.network=web
      - traefik.http.routers.asistan.rule=Host(`asixtan.com`) || Host(`www.asixtan.com`)
      - traefik.http.routers.asistan.entrypoints=websecure
      - traefik.http.routers.asistan.tls=true
      - traefik.http.routers.asistan.tls.certresolver=mytlschallenge
      - traefik.http.services.asistan.loadbalancer.server.port=3000
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

networks:
  web:
    external: true
