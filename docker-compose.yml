# aSistan — Hostinger VPS (Traefik + asixtan.com)
# env از Hostinger Docker Manager (پارامتر environment) تزریق می‌شود

services:
  asistan-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asistan-app
    restart: unless-stopped
    networks:
      - default
      - traefik
    labels:
      - traefik.enable=true
      - traefik.docker.network=root_default
      - traefik.http.routers.asistan.rule=Host(`asixtan.com`) || Host(`www.asixtan.com`)
      - traefik.http.routers.asistan.entrypoints=websecure
      - traefik.http.routers.asistan.tls.certresolver=letsencrypt
      - traefik.http.services.asistan.loadbalancer.server.port=3000
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

networks:
  traefik:
    external: true
    name: root_default
